
services:

  ignition:
    image: inductiveautomation/ignition:${IGNITION_VERSION}
    container_name: ignition-prod
    ports:
      - "${GATEWAY_HTTP_PORT}:8088"
      - "${GATEWAY_HTTPS_PORT}:8043"
    environment:
      GATEWAY_ADMIN_USERNAME: ${GATEWAY_ADMIN_USERNAME}
      GATEWAY_ADMIN_PASSWORD: ${GATEWAY_ADMIN_PASSWORD}
      IGNITION_EDITION: ${IGNITION_EDITION}
    volumes:
      # Same curated mounts as dev — identical paths
      - ../ignition/data/projects:/usr/local/bin/ignition/data/projects
      - ../ignition/data/modules:/usr/local/bin/ignition/data/modules
      - ../ignition/conf:/usr/local/bin/ignition/data/conf
      # Runtime DB in named volume
      - ignition_prod_data:/usr/local/bin/ignition/data/db
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - ignition-prod-net

  postgres:
    image: postgres:15
    container_name: postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../postgres/init:/docker-entrypoint-initdb.d
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - ignition-prod-net

volumes:
  ignition_prod_data:
  postgres_prod_data:

networks:
  ignition-prod-net:
    driver: bridge
